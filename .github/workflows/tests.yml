name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # Les tests utilisent SQLite : on evite toute connexion MySQL/Cloudinary.
      DATABASE_URL: sqlite:///./test_ci.db

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancement des tests pytest
        run: pytest -v
